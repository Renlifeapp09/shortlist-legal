<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal — The Shortlist</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #faf9f7;
      color: #1a1a1a;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 28px;
    }

    .brand {
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .brand span {
      font-weight: 500;
    }

    .subtitle {
      font-size: 13px;
      font-weight: 300;
      color: #8b7d6b;
      margin-bottom: 40px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .links a {
      display: block;
      padding: 16px 32px;
      border: 1px solid #e8e4df;
      border-radius: 12px;
      text-decoration: none;
      color: #1a1a1a;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.5px;
      transition: border-color 0.2s, background-color 0.2s;
    }

    .links a:hover {
      border-color: #a8d5c5;
      background-color: #d6ede6;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="brand"><span>The Shortlist</span></div>
    <p class="subtitle">Legal Documents</p>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </div>
  </div>

</body>
</html>
